<html>
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, height=device-height, minimum-scale=1, maximum-scale=1, , initial-scale=1">
	</head>
	<body>
		<p id="state">Trang thai: </p>
		<button onclick="test()">TEST</button>
	</body>
	<script>
		let url = "https://script.google.com/macros/s/AKfycby-r23HN4pSwEHfq1JuRkjobaRiY-iSRH8HdVQcZcK1T6zEOBa1jGMAdHt4xOsNhvJz/exec";
		function test()
		{
			let obj = {
				index: 3,
				id: "DPQ",
			}
			fetch(url, {
				method: "POST",
				body: JSON.stringify(obj)
			})
			.then(r => r.text())
			.then(data => {document.getElementById("state").innerHTML = "Trang thai: " + data})
		}
	</script>
</html>
